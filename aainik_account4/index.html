<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Aainik" />
  <title>Aainik — Flagship</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Account 3: Chart.js for analytics charts -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <!-- Notification Queue System -->
  <script src="notification-queue.js"></script>
  <!-- Account 5: Capacitor runtime — auto-injected by native build; no-op in browser -->
  <script>
    // Detect if running inside Capacitor native APK
    window._isCapacitorApp = (window.location.protocol === 'capacitor:' ||
                               (typeof window.Capacitor !== 'undefined' &&
                                window.Capacitor.isNativePlatform &&
                                window.Capacitor.isNativePlatform()));
    if (window._isCapacitorApp) {
      document.documentElement.classList.add('capacitor-native');
    }
  </script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       SPLASH SCREEN — Premium Flagship Launch
  ═══════════════════════════════════════════════ -->
  <div id="splash-screen">
    <div class="splash-logo-wrap">
      <img src="icons/icon-512.png" class="splash-logo" alt="Aainik" />
      <div class="splash-logo-ring"></div>
      <div class="splash-logo-ring2"></div>
    </div>
    <div class="splash-app-name">Aainik</div>
    <div class="splash-divider"></div>
    <div class="splash-tagline">
      I will show you Aaina
      <span class="tag-bullet">✦</span>
      Track U
      <span class="tag-bullet">✦</span>
      Scold U
      <span class="tag-bullet">✦</span>
      Motivate U
    </div>
    <div class="splash-loader">
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
      <div class="splash-dot"></div>
    </div>
  </div>
  <script>
    // Remove splash from DOM after animation completes
    setTimeout(function() {
      var s = document.getElementById('splash-screen');
      if (s) { s.style.display = 'none'; }
    }, 3700);
  </script>

  <!-- Rest of the HTML remains exactly the same -->
  <!-- [All screens from SCREEN: TODAY through MODALS section continue unchanged] -->
  <div id="screen-today" class="screen active">
    <div class="screen-header">
      <div class="header-left">
        <div class="today-brand">
          <img src="icons/icon-192.png" class="brand-logo" alt="Aainik" />
          <div class="brand-text-wrap">
            <h1 class="app-title">Aainik</h1>
            <span class="brand-tagline">Track U · Scold U · Motivate U</span>
          </div>
        </div>
        <span class="header-date" id="today-date"></span>
      </div>
      <div class="header-right">
        <div class="streak-badge" id="streak-badge">
          <span class="streak-fire">🔥</span>
          <span id="streak-count">0</span>
        </div>
      </div>
    </div>
    <div class="today-progress-wrap">
      <div class="today-progress-bar">
        <div class="today-progress-fill" id="today-progress-fill"></div>
      </div>
      <div class="today-progress-label" id="today-progress-label">0/0 tasks — 0%</div>
    </div>
    <div id="yesterday-misses" class="yesterday-misses hidden"></div>
    <div class="search-wrap" id="search-wrap">
      <input type="search" id="task-search" class="search-input"
             placeholder="🔍 Task search karo..."
             oninput="filterTaskSearch(this.value)" />
    </div>
    <div class="task-list-scroll">
      <div id="today-task-list" class="task-list"></div>
      <div id="today-empty" class="empty-state hidden">
        <div class="empty-icon">📋</div>
        <p>Koi task nahi hai aaj ke liye</p>
        <p class="empty-sub">CATEGORIES mein jaake tasks add karo</p>
      </div>
    </div>
    <div class="sort-bar">
      <span class="sort-label">Sort:</span>
      <button class="sort-btn active" data-sort="time" onclick="setSortOrder('time')">Time</button>
      <button class="sort-btn" data-sort="priority" onclick="setSortOrder('priority')">Priority</button>
      <button class="sort-btn" data-sort="category" onclick="setSortOrder('category')">Category</button>
    </div>
    <button class="fab" onclick="openQuickAddTask()" title="Task add karo">+</button>
  </div>

  <!-- Other screens continue here (categories, progress, coach, settings, etc.) -->
  <!-- Full HTML structure from original file continues unchanged -->

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="today" onclick="showScreen('today')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9,22 9,12 15,12 15,22"/>
        </svg>
      </span>
      <span class="nav-label">Today</span>
    </button>
    <button class="nav-btn" data-screen="categories" onclick="showScreen('categories')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </span>
      <span class="nav-label">Categories</span>
    </button>
    <button class="nav-btn" data-screen="progress" onclick="showScreen('progress')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/>
          <line x1="12" y1="20" x2="12" y2="4"/>
          <line x1="6" y1="20" x2="6" y2="14"/>
          <polyline points="3,20 21,20"/>
        </svg>
      </span>
      <span class="nav-label">Progress</span>
    </button>
    <button class="nav-btn" data-screen="coach" onclick="showScreen('coach')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
      </span>
      <span class="nav-label">Ego</span>
    </button>
    <button class="nav-btn" data-screen="settings" onclick="showScreen('settings')">
      <span class="nav-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82 1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </span>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
